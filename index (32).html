
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mô phỏng bay tên lửa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    background:rgb(120,120,120);
    color:#fff;
    font-family:system-ui,sans-serif;
    overflow:hidden;
    transition:background .3s linear;
}
.panel{
    position:fixed;
    top:10px;
    left:10px;
    background:rgba(0,0,0,.6);
    padding:12px 14px;
    border-radius:10px;
    font-size:14px;
    line-height:1.6;
    z-index:10;
}
.controls{
    position:fixed;
    top:10px;
    right:10px;
    display:flex;
    gap:8px;
    z-index:10;
}
button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
}
.rocket{
    position:absolute;
    bottom:40px;
    left:50%;
    font-size:48px;
    transform:translateX(-50%) rotate(-90deg);
    z-index:5;
}
.ground{
    position:absolute;
    bottom:0;
    width:100%;
    height:120px;
    background:linear-gradient(#3b3b3b,#1a1a1a);
    z-index:1;
}
.status{
    position:fixed;
    bottom:20px;
    width:100%;
    text-align:center;
    font-size:18px;
    z-index:10;
}
</style>
</head>

<body>

<div class="panel" id="info"></div>

<div class="controls">
    <button onclick="start()">🚀 Phóng</button>
    <button onclick="pause()">⏸ Dừng</button>
    <button onclick="resetSim()">🔄 Reset</button>
</div>

<div class="rocket" id="rocket">🚀</div>
<div class="ground" id="ground"></div>
<div class="status" id="status"></div>

<script>
/* ===== CẤU HÌNH ===== */
const FPS = 60;
const DT = 1 / FPS;
const DAY_SEC = 86400;
const SMOOTH = 0.15;

/* ===== GIÁ TRỊ KHỞI ĐIỂM ===== */
const INIT = {
    height: 1,
    timeSec: 0,
    day: 0,
    dailyRate: 1,
    running: true
};

/* ===== TRẠNG THÁI ===== */
let running = INIT.running;
let height = INIT.height;
let lastHeight = height;
let speed = 0;
let timeSec = INIT.timeSec;
let day = INIT.day;
let dailyRate = INIT.dailyRate;
let lastGrowth = dailyRate * 0.01;

/* ===== HIỂN THỊ MƯỢT ===== */
let dHeight = height;
let dSpeed = speed;
let dTime = timeSec;
let dRate = dailyRate;
let dGrowth = lastGrowth;

/* ===== LOAD SAVE ===== */
const save = localStorage.getItem("rocketSave");
if(save){
    const s = JSON.parse(save);
    height = s.height;
    lastHeight = s.lastHeight;
    speed = s.speed;
    timeSec = s.timeSec;
    day = s.day;
    dailyRate = s.dailyRate;
    lastGrowth = s.lastGrowth;
    running = s.running;

    dHeight = height;
    dSpeed = speed;
    dTime = timeSec;
    dRate = dailyRate;
    dGrowth = lastGrowth;
}

/* ===== SAVE ===== */
function saveState(){
    localStorage.setItem("rocketSave", JSON.stringify({
        height,
        lastHeight,
        speed,
        timeSec,
        day,
        dailyRate,
        lastGrowth,
        running
    }));
}
setInterval(saveState, 500);

/* ===== HÀM PHỤ ===== */
const lerp=(a,b,t)=>a+(b-a)*t;
const lerpColor=(c1,c2,t)=>`rgb(${lerp(c1[0],c2[0],t)},${lerp(c1[1],c2[1],t)},${lerp(c1[2],c2[2],t)})`;
const fmt=(x,d=3)=>Math.abs(x)>=1e10?x.toExponential(3):x.toFixed(d);

/* ===== NỀN TRỜI ===== */
function updateSky(h){
    if(h<3000) document.body.style.background=lerpColor([120,120,120],[80,150,255],h/3000);
    else if(h<10000) document.body.style.background=lerpColor([80,150,255],[20,40,80],(h-3000)/7000);
    else if(h<100000) document.body.style.background=lerpColor([20,40,80],[0,0,0],(h-10000)/90000);
    else document.body.style.background="rgb(0,0,0)";
}

/* ===== TRẠNG THÁI ĐỘ CAO ===== */
function getStatus(h){
    if(h>=200000) return "✨ Thấy các ngôi sao sáng";
    if(h>=100000) return "🚀 Đã vào vũ trụ";
    if(h>=20000)  return "✈️ Ra khỏi tầng đối lưu";
    if(h>=3000)   return "☁️ Bay trong mây";
    return "🌫 Trời xám – sắp mưa";
}

/* ===== ĐIỀU KHIỂN ===== */
function start(){ running=true; }
function pause(){ running=false; }

function resetSim(){
    localStorage.removeItem("rocketSave");
    running = INIT.running;
    height = INIT.height;
    lastHeight = height;
    speed = 0;
    timeSec = INIT.timeSec;
    day = INIT.day;
    dailyRate = INIT.dailyRate;
    lastGrowth = dailyRate * 0.01;

    dHeight = height;
    dSpeed = speed;
    dTime = timeSec;
    dRate = dailyRate;
    dGrowth = lastGrowth;
}

/* ===== LOOP ===== */
let last = performance.now(), acc = 0;
function loop(now){
    acc += (now-last)/1000;
    last = now;

while(acc>=DT){
    if(running){
        timeSec += DT;

        // ⭐ rate growth luôn = 1% của rate hiện tại
        lastGrowth = dailyRate * 0.01;

        // ⭐ rate tăng liên tục theo growth
        dailyRate *= Math.pow(1 + lastGrowth, DT / DAY_SEC);

        // ⭐ height tăng theo rate
        height *= Math.pow(dailyRate, DT / DAY_SEC);

        speed = (height - lastHeight) / DT;
        lastHeight = height;

        // cập nhật ngày
        day = Math.floor(timeSec / DAY_SEC);
    }
    acc -= DT;
}

    dHeight = lerp(dHeight, height, SMOOTH);
    dSpeed  = lerp(dSpeed, speed, SMOOTH);
    dTime   = lerp(dTime, timeSec, SMOOTH);
    dRate   = lerp(dRate, dailyRate, SMOOTH);
    dGrowth = lerp(dGrowth, lastGrowth, SMOOTH);

    updateSky(dHeight);

    info.innerHTML = `
⏱ ${fmt(dTime,2)} s<br>
📅 Ngày ${day}<br>
📏 ${fmt(dHeight)} m (${fmt(dHeight/1000)} km)<br>
🚀 ${fmt(dSpeed,6)} m/s<br>
📈 Rate: ${fmt(dRate,6)}<br>
⚙ Rate growth: ${fmt(dGrowth,6)}<br>
▶️ ${running ? "Đang phóng" : "Đã dừng"}
    `;

    status.innerText = getStatus(dHeight);

    const y = Math.min(dHeight/200000*(innerHeight-140), innerHeight-140);
    rocket.style.transform = `translate(-50%,-${y}px) rotate(-45deg)`;

    ground.style.transform = `translateY(${Math.min(dHeight/200*120,200)}px)`;
    ground.style.opacity = Math.max(1 - dHeight/5000, 0);

    requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>

</body>
</html>

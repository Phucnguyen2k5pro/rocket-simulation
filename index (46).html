<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mô phỏng bay tên lửa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    overflow:hidden;
    font-family:system-ui,sans-serif;
    background:rgb(120,120,120);
    color:#fff;
    transition:background .3s linear;
}

/* ===== BẢNG THÔNG SỐ ===== */
.panel{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    width:min(95%,520px);

    background:rgba(0,0,0,.65);
    backdrop-filter:blur(8px);

    padding:14px;
    border-radius:14px;

    font-size:15px;
    line-height:1.7;

    z-index:20;

    border:1px solid rgba(255,255,255,.1);
}

/* ===== NÚT DƯỚI ===== */
.controls{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    gap:10px;

    z-index:30;
}

button{
    border:none;
    border-radius:12px;

    padding:12px 18px;

    font-size:15px;
    font-weight:600;

    cursor:pointer;

    background:#fff;
    color:#000;

    transition:.15s;
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(.96);
}

/* ===== TÊN LỬA ===== */
.rocket{
    position:absolute;
    left:50%;
    bottom:40px;

    transform:translateX(-50%) rotate(-45deg);

    font-size:54px;

    z-index:10;

    will-change:transform;
}

/* ===== MẶT ĐẤT ===== */
.ground{
    position:absolute;
    bottom:0;
    left:0;

    width:100%;
    height:120px;

    background:linear-gradient(
        to bottom,
        #7f7f7f,
        #555,
        #2b2b2b
    );

    z-index:2;

    will-change:transform,opacity;
}

/* ===== STATUS ===== */
.status{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);

    font-size:20px;
    font-weight:700;
    text-shadow:0 0 10px rgba(255,255,255,.35);

    z-index:20;
}

/* ===== SAO ===== */
.star{
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:0;
    transition:opacity .8s;
    z-index:1;
}

#star1{
    width:4px;
    height:4px;
    top:120px;
    left:80px;
}

#star2{
    width:3px;
    height:3px;
    top:180px;
    left:220px;
}

#star3{
    width:5px;
    height:5px;
    top:260px;
    left:140px;
}

#star4{
    width:4px;
    height:4px;
    top:90px;
    right:140px;
}

#star5{
    width:3px;
    height:3px;
    top:220px;
    right:90px;
}
</style>
</head>

<body>

<!-- ===== BẢNG THÔNG SỐ ===== -->
<div class="panel" id="info"></div>

<!-- ===== SAO ===== -->
<div class="star" id="star1"></div>
<div class="star" id="star2"></div>
<div class="star" id="star3"></div>
<div class="star" id="star4"></div>
<div class="star" id="star5"></div>

<!-- ===== TÊN LỬA ===== -->
<div class="rocket" id="rocket">🚀</div>

<!-- ===== MẶT ĐẤT ===== -->
<div class="ground" id="ground"></div>

<!-- ===== STATUS ===== -->
<div class="status" id="status"></div>

<!-- ===== NÚT ===== -->
<div class="controls">
    <button onclick="start()">🚀 Phóng</button>
    <button onclick="pause()">⏸ Dừng</button>
    <button onclick="resetSim()">🔄 Reset</button>
</div>

<script>

/* ================= CONFIG ================= */

const FPS = 60;
const DT = 1 / FPS;
const DAY_SEC = 86400;

const SMOOTH = 0.15;

/* ================= INIT ================= */

const INIT = {
    height:1,
    timeSec:0,
    day:0,
    dailyRate:1,
    running:true
};

/* ================= STATE ================= */

let running = INIT.running;

let height = INIT.height;
let lastHeight = height;

let speed = 0;

let timeSec = INIT.timeSec;
let day = INIT.day;

let dailyRate = INIT.dailyRate;
let lastGrowth = dailyRate * 0.01;

/* ===== DISPLAY ===== */

let dHeight = height;
let dSpeed = speed;
let dTime = timeSec;
let dRate = dailyRate;
let dGrowth = lastGrowth;

/* ================= LOAD SAVE ================= */

const save = localStorage.getItem("rocketSave");

if(save){

    const s = JSON.parse(save);

    height = s.height;
    lastHeight = s.lastHeight;

    speed = s.speed;

    timeSec = s.timeSec;
    day = s.day;

    dailyRate = s.dailyRate;
    lastGrowth = s.lastGrowth;

    running = s.running;

    dHeight = height;
    dSpeed = speed;
    dTime = timeSec;
    dRate = dailyRate;
    dGrowth = lastGrowth;
}

/* ================= SAVE ================= */

function saveState(){

    localStorage.setItem("rocketSave", JSON.stringify({

        height,
        lastHeight,
        speed,

        timeSec,
        day,

        dailyRate,
        lastGrowth,

        running
    }));
}

setInterval(saveState, 500);

/* ================= HELPERS ================= */

const lerp = (a,b,t)=>a+(b-a)*t;

const lerpColor = (c1,c2,t)=>`
rgb(
${lerp(c1[0],c2[0],t)},
${lerp(c1[1],c2[1],t)},
${lerp(c1[2],c2[2],t)}
)`;

/* ===== FORMAT NUMBER ===== */

function fmt(x,d=3){

    if(Math.abs(x)>=1e10){
        return x.toExponential(3);
    }

    return x.toFixed(d);
}

/* ===== FORMAT TIME ===== */

function formatTime(sec){

    sec = Math.floor(sec);

    const years = Math.floor(sec / 31536000);
    sec %= 31536000;

    const months = Math.floor(sec / 2592000);
    sec %= 2592000;

    const days = Math.floor(sec / 86400);
    sec %= 86400;

    const hours = Math.floor(sec / 3600);
    sec %= 3600;

    const minutes = Math.floor(sec / 60);
    sec %= 60;

    return `
${years}y 
${months}mo 
${days}d 
${String(hours).padStart(2,'0')}h 
${String(minutes).padStart(2,'0')}m 
${String(sec).padStart(2,'0')}s
`;
}

/* ================= SKY ================= */

function updateSky(h){

    if(h < 3000){

        document.body.style.background =
        lerpColor(
            [120,120,120],
            [80,150,255],
            h / 3000
        );
    }

    else if(h < 10000){

        document.body.style.background =
        lerpColor(
            [80,150,255],
            [20,40,80],
            (h-3000)/7000
        );
    }

    else if(h < 100000){

        document.body.style.background =
        lerpColor(
            [20,40,80],
            [0,0,0],
            (h-10000)/90000
        );
    }

    else{
        document.body.style.background = "rgb(0,0,0)";
    }
}

/* ================= STATUS ================= */

function getStatus(h){

    if(h>=200000) return "✨ Thấy các ngôi sao sáng";
    if(h>=100000) return "🚀 Đã vào vũ trụ";
    if(h>=20000)  return "✈️ Ra khỏi tầng đối lưu";
    if(h>=3000)   return "☁️ Bay trong mây";

    return "🌫 Trời xám – sắp mưa";
}

/* ================= STARS ================= */

function updateStars(h){

    const opacity = h >= 200000
        ? Math.min((h-200000)/50000,1)
        : 0;

    document.querySelectorAll(".star")
        .forEach(s=>{
            s.style.opacity = opacity;
        });
}

/* ================= CONTROLS ================= */

function start(){
    running = true;
}

function pause(){
    running = false;
}

function resetSim(){

    localStorage.removeItem("rocketSave");

    running = INIT.running;

    height = INIT.height;
    lastHeight = height;

    speed = 0;

    timeSec = INIT.timeSec;
    day = INIT.day;

    dailyRate = INIT.dailyRate;
    lastGrowth = dailyRate * 0.01;

    dHeight = height;
    dSpeed = speed;
    dTime = timeSec;
    dRate = dailyRate;
    dGrowth = lastGrowth;
}

/* ================= LOOP ================= */

let last = performance.now();
let acc = 0;

function loop(now){

    acc += (now-last)/1000;
    last = now;

    while(acc >= DT){

        if(running){

            timeSec += DT;

            /* ===== RATE GROWTH ===== */

            lastGrowth = dailyRate * 0.01;

            dailyRate *= Math.pow(
                1 + lastGrowth,
                DT / DAY_SEC
            );

            /* ===== HEIGHT ===== */

            height *= Math.pow(
                dailyRate,
                DT / DAY_SEC
            );

            /* ===== SPEED ===== */

            speed = (height - lastHeight) / DT;
            lastHeight = height;

            /* ===== DAY ===== */

            day = Math.floor(timeSec / DAY_SEC);
        }

        acc -= DT;
    }

    /* ===== SMOOTH ===== */

    dHeight = lerp(dHeight,height,SMOOTH);
    dSpeed  = lerp(dSpeed,speed,SMOOTH);
    dTime   = lerp(dTime,timeSec,SMOOTH);
    dRate   = lerp(dRate,dailyRate,SMOOTH);
    dGrowth = lerp(dGrowth,lastGrowth,SMOOTH);

    /* ===== VISUAL ===== */

    updateSky(dHeight);
    updateStars(dHeight);

    /* ===== PANEL ===== */

    info.innerHTML = `
<div>⏱ <b>${formatTime(dTime)}</b></div>
<div>📅 Ngày <b>${day}</b></div>
<div>📏 <b>${fmt(dHeight)} m</b></div>
<div>🌍 <b>${fmt(dHeight/1000)} km</b></div>
<div>🚀 <b>${fmt(dSpeed,6)} m/s</b></div>
<div>⚡ <b>${fmt(dSpeed*3.6,3)} km/h</b></div>
<div>📈 Rate: <b>${fmt(dRate,6)}</b></div>
<div>⚙ Rate growth: <b>${fmt(dGrowth,6)}</b></div>
<div>▶️ <b>${running ? "Đang phóng" : "Đã dừng"}</b></div>
`;

    status.innerText = getStatus(dHeight);

    /* ===== ROCKET ===== */

    const y = Math.min(
        dHeight / 200000 * (innerHeight - 140),
        innerHeight - 140
    );

    rocket.style.transform =
    `translate(-50%,-${y}px) rotate(-45deg)`;

    /* ===== GROUND ===== */

    ground.style.transform =
    `translateY(${Math.min(dHeight/200*120,200)}px)`;

    ground.style.opacity =
    Math.max(1 - dHeight/5000,0);

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

</script>

</body>
</html>
